name: Refresh Articles

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run article refresh
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/yamanaka-refresh.js

      - name: Commit updated files
        run: |
          git config user.name "yamanaka-bot"
          git config user.email "bot@yamanakafactors.com"
          git add articles.json archive-index.json archive/ rss.xml
          git diff --cached --quiet || git commit -m "🔬 Auto-refresh: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
